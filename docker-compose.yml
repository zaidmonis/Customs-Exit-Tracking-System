services:
  oracle:
    image: gvenzl/oracle-free:23.6-slim
    container_name: customs-exit-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_ADMIN_PASSWORD:-oracle_admin_password}
      APP_USER: ${ORACLE_APP_USER:-customs_app}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD:-PasswordABC123!@}
      ORACLE_DATABASE: ${ORACLE_DATABASE:-CUSTOMSDB}
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/init:/container-entrypoint-initdb.d
    networks:
      - external-net
      - internal-net

  service-a:
    build:
      context: .
      dockerfile: src/CustomsExitTracking.ServiceA.Api/Dockerfile
    container_name: customs-exit-service-a
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Oracle: Data Source=oracle:1521/${ORACLE_DATABASE:-CUSTOMSDB};User Id=${ORACLE_APP_USER:-customs_app};Password=${ORACLE_APP_PASSWORD:-PasswordABC123!@};
      ServiceB__BaseUrl: http://service-b:8080
    depends_on:
      oracle:
        condition: service_healthy
    ports:
      - "${SERVICE_A_HTTP_PORT:-8080}:8080"
    networks:
      - external-net
      - internal-net

  service-b:
    build:
      context: .
      dockerfile: src/CustomsExitTracking.ServiceB.Api/Dockerfile
    container_name: customs-exit-service-b
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Oracle: Data Source=oracle:1521/${ORACLE_DATABASE:-CUSTOMSDB};User Id=${ORACLE_APP_USER:-customs_app};Password=${ORACLE_APP_PASSWORD:-PasswordABC123!@};
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - internal-net

networks:
  external-net:
  internal-net:

volumes:
  oracle-data:
